<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}クイズアプリ{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", "Hiragino Sans", "Meiryo", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    .card {
      background: #fff;
      width: min(90vw, 480px);
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      text-align: center;
    }
    .badge {
      display: inline-block;
      font-size: 0.85rem;
      color: #764ba2;
      background: #f0ebfa;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.5rem; margin: 0 0 24px; line-height: 1.5; }
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 10px;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #764ba2; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      color: #fff;
      background: #764ba2;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn.secondary { background: #999; margin-top: 10px; }
    .section-list { display: flex; flex-direction: column; gap: 12px; margin-top: 8px; }
    .section-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
    }
    .section-btn .count {
      font-size: 0.8rem;
      font-weight: normal;
      background: rgba(255, 255, 255, 0.25);
      padding: 2px 10px;
      border-radius: 999px;
    }
    .answer-box {
      background: #f0f7f2;
      border: 2px solid #2e9e5b;
      border-radius: 12px;
      padding: 16px;
      margin: 8px 0 20px;
    }
    .answer-box-title {
      font-size: 0.85rem;
      font-weight: bold;
      color: #2e9e5b;
      margin-bottom: 6px;
    }
    .answer-box-text {
      font-size: 1.3rem;
      font-weight: bold;
      color: #222;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .judge-list { display: flex; gap: 12px; margin-bottom: 10px; }
    .judge-btn { flex: 1; }
    .judge-correct { background: #2e9e5b; }
    .judge-incorrect { background: #d9534f; }
    .explanation {
      text-align: left;
      background: #f5f3fb;
      border-left: 4px solid #764ba2;
      border-radius: 8px;
      padding: 14px 16px;
      margin: 8px 0 24px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #444;
      white-space: pre-wrap;
    }
    .explanation-title {
      font-weight: bold;
      color: #764ba2;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .score {
      font-size: 1.15rem;
      margin: 16px 0 28px;
      color: #444;
    }
    .score-num {
      font-size: 2.6rem;
      font-weight: bold;
      color: #764ba2;
      vertical-align: middle;
    }
    .score-percent {
      margin-top: 8px;
      font-size: 0.95rem;
      color: #666;
    }
    .result-icon { font-size: 4rem; margin-bottom: 8px; }
    .correct { color: #2e9e5b; }
    .incorrect { color: #d9534f; }
    .note { color: #666; font-size: 0.95rem; margin: 12px 0 24px; }
    .answer-text { font-weight: bold; color: #333; }
  </style>
</head>
<body>
  <div class="card">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
